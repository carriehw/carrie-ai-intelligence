<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:300px; height:300px;
  font-family: Inter, -apple-system, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 85% 8%, rgba(90,66,244,.16), transparent 42%),
    radial-gradient(circle at 8% 95%, rgba(90,66,244,.10), transparent 38%),
    #f7f5ef;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#101114; text-align:center;
}
.carrie { font-size:34px; font-weight:800; letter-spacing:-.02em; }
.ai { font-size:104px; font-weight:900; color:#5a42f4; letter-spacing:-.06em; line-height:1; margin:2px 0 6px; }
.intel { font-size:19px; font-weight:800; letter-spacing:.34em; text-indent:.34em; }
.bar { margin-top:16px; display:flex; gap:7px; }
.dot { width:34px; height:7px; border-radius:99px; }
</style></head><body>
  <div class="carrie">Carrie</div>
  <div class="ai">AI</div>
  <div class="intel">INTELLIGENCE</div>
  <div class="bar">
    <div class="dot" style="background:#d63b2f"></div>
    <div class="dot" style="background:#1763d8"></div>
    <div class="dot" style="background:#7a2fd0"></div>
  </div>
</body></html>
